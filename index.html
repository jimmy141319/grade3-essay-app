<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>小三課後輔導小幫手 V10</title>
<style>
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#fff7df,#eef8ff);color:#263238;line-height:1.7}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid #eadfcb;padding:12px 14px;text-align:center}
header h1{margin:0;font-size:22px}
header p{margin:2px 0 0;color:#667;font-size:13px}
main{max-width:1120px;margin:0 auto;padding:14px 12px 52px}
.card{background:#fff;border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(120,80,30,.1)}
h2{margin:0 0 10px;color:#f08a00;font-size:23px}
h3{margin:14px 0 8px;color:#267a78}
.small{color:#667;font-size:15px}
.modeBar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;position:sticky;top:70px;z-index:20}
.modeBtn{border:0;border-radius:20px;padding:14px 10px;font-size:18px;font-weight:900;background:#f3f6fa;color:#456;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.modeBtn.active{background:#2088d6;color:#fff}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
@media(min-width:760px){
  .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  main{padding:22px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  header h1{font-size:28px}
  .modeBar{top:78px}
}
.btn,.subjectBtn,.chip{border:0;border-radius:18px;padding:12px 14px;font-size:17px;font-weight:800;cursor:pointer}
.btn{background:#2088d6;color:white;border-radius:999px}
.subjectBtn{background:#e9f6ff;color:#176d9f;text-align:left;min-height:78px}
.subjectBtn.active{background:#2088d6;color:white}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.chip{background:#fff3d8;color:#9a5b00;font-size:15px;white-space:nowrap;flex:0 0 auto}
.chip.active{background:#ffb23f;color:#fff}
.box{background:#eef8ff;border-left:8px solid #4da3ff;border-radius:18px;padding:14px;margin-top:10px}
.sample{background:#fffaf0;border-left:8px solid #ffb23f;border-radius:18px;padding:14px;margin-top:10px;white-space:pre-wrap}
ul{padding-left:22px}
.quizItem{background:#f8fbff;border:1px solid #d8ecff;border-radius:18px;padding:14px;margin:10px 0}
.option{display:block;width:100%;text-align:left;margin:8px 0;padding:11px 12px;border-radius:14px;border:1px solid #cfe5fa;background:#fff;font-size:16px;color:#1172b3;font-weight:800}
.option.correct{background:#e5ffe9;border-color:#65c278;color:#116b22}
.option.wrong{background:#ffecec;border-color:#e57b7b;color:#9b1c1c}
.feedback{font-weight:800;margin-top:8px}
textarea{width:100%;min-height:130px;border:2px solid #cfe9ff;border-radius:16px;padding:12px;font-size:17px;line-height:1.8;resize:vertical;background:#fbfdff}
.hidden{display:none}
.notice{background:#fff8e6;border:1px solid #ffd78a;color:#755000;border-radius:16px;padding:12px;margin:10px 0;font-weight:700}
.footer{text-align:center;color:#777;font-size:13px;padding:20px}
</style>
</head>
<body>
<header>
  <h1>小三課後輔導小幫手</h1>
  <p>V10・完整覆蓋版｜科目和作文完全分開｜iPad / 手機 / 電腦可用</p>
</header>

<main>
  <div class="modeBar">
    <button id="modeSubjectBtn" class="modeBtn active" onclick="switchMode('subject')">📚 科目輔導</button>
    <button id="modeEssayBtn" class="modeBtn" onclick="switchMode('essay')">✏️ 作文練習</button>
  </div>

  <section id="subjectPage">
    <section class="card">
      <h2>一、選擇課目</h2>
      <p class="small">這裡只放課目輔導，不混作文。點課目後會出現該科重點、小測驗和解釋。</p>
      <div id="subjectGrid" class="grid"></div>
    </section>

    <section class="card">
      <h2 id="subjectTitle">課目重點</h2>
      <div class="split">
        <div>
          <h3>學習重點</h3>
          <div id="pointsBox" class="box"></div>
        </div>
        <div>
          <h3>課後輔導步驟</h3>
          <div id="stepsBox" class="box"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>二、小測驗</h2>
      <p class="small">答錯會顯示解釋，可以當作課後複習。</p>
      <div id="quizBox"></div>
    </section>
  </section>

  <section id="essayPage" class="hidden">
    <section class="card">
      <h2>作文練習</h2>
      <div class="notice">作文區已獨立，不會和英文、數學、自然小測驗混在一起。</div>
      <p class="small">範例字數採「不含標點符號、不含空白」計算。請先選題目，再看四段式引導。</p>
      <div id="essayChips" class="chips"></div>
    </section>

    <section class="card">
      <h2 id="essayTitle">作文題目</h2>
      <h3>四段式引導</h3>
      <div id="essayGuide" class="box"></div>
      <h3>範例作文</h3>
      <div id="essaySample" class="sample"></div>
      <div id="essayCount" class="small"></div>
    </section>

    <section class="card">
      <h2>自己練習寫</h2>
      <textarea id="essayInput" oninput="updateEssayCount()" placeholder="請照四段式練習寫作文。"></textarea>
      <div id="myCount" class="small">目前字數：不含標點約 0 字</div>
    </section>
  </section>
</main>

<div class="footer">GitHub Pages 單檔版｜小三課後輔導 V10</div>

: {"icon": "📖", "goal": "閱讀理解、生字詞、造句、課文重點", "points": ["生字：字音、字形、字義。", "詞語：相似詞、相反詞、照樣造句。", "閱讀：找時間、地點、人物、原因、經過、結果。", "作文：開頭、經過一、經過二、感想。"], "steps": ["先讀題目，圈出關鍵字。", "用一句話說出這題在問什麼。", "回答時要完整。", "作文先列四段大綱，再開始寫。"], "quiz": [{"q": "寫遊記作文時，第一段最適合先寫什麼？", "o": ["時間地點人物心情", "只寫食物", "直接寫結論", "只寫天氣"], "a": "時間地點人物心情", "e": "第一段先交代基本背景。"}, {"q": "「開心」的相反詞比較接近哪一個？", "o": ["快樂", "難過", "漂亮", "勇敢"], "a": "難過", "e": "開心和難過意思相反。"}, {"q": "閱讀故事時，想知道事情為什麼發生，要找哪一項？", "o": ["原因", "顏色", "聲音", "頁碼"], "a": "原因", "e": "為什麼發生就是原因。"}]}};
const essaySamples = {"我的家人": "我的家人有爸爸、媽媽和我。今天我想介紹我的媽媽，因為她每天都很照顧我，也是我最想感謝的人。每天早上，媽媽會叫我起床，提醒我刷牙、洗臉，還會幫我準備早餐。雖然她有時候很忙，但是她總是把家裡照顧得很好。\n\n媽媽的個性很溫柔，可是我做錯事的時候，她也會認真提醒我。有一次我寫功課寫到一半就想玩，媽媽沒有馬上罵我，而是坐在旁邊告訴我，事情要先完成，玩起來才會安心。聽了她的話，我又繼續把功課寫完。\n\n我覺得媽媽非常辛苦。她不只照顧我的生活，也關心我的心情。當我難過的時候，她會安慰我；當我進步的時候，她也會鼓勵我。我希望自己可以更懂事，主動幫忙做家事，也用好成績和好態度讓媽媽開心。從那天開始，我也提醒自己不要只接受家人的照顧，而是要學會表達感謝。雖然我還是小學生，但是我可以從整理書包、收拾餐具這些小事開始，讓家裡變得更溫暖。", "我的朋友": "我有一位好朋友，他的名字叫小宇。我們從一年級開始就是同班同學，常常一起下課、一起聊天，也會互相分享有趣的事情。小宇個子不高，但是跑步很快，笑起來很親切，所以班上很多同學都喜歡和他一起玩。\n\n小宇的個性很熱心。有一次下課時，我不小心跌倒，膝蓋有一點痛，心裡也很害怕。小宇看到以後，立刻跑過來扶我，還陪我一起去找老師。雖然這只是一件小事，但是我一直記在心裡，因為那時候我覺得他真的很關心朋友。\n\n我也希望自己能像小宇一樣，遇到別人需要幫忙時，不要只站在旁邊看，而是勇敢伸出手。朋友不是只有一起玩的時候才重要，在困難的時候互相幫忙，才是真正的好朋友。我很珍惜這份友誼，希望我們以後也能一直當好朋友。現在只要想到那一天，我就會提醒自己也要做一個值得信任的人。當朋友開心時，我可以陪他一起笑；當朋友遇到困難時，我也要陪在旁邊，給他力量。", "快樂的一天": "星期天早上，天氣很好，天空藍藍的，白雲像棉花一樣。我和爸爸媽媽一起去公園玩，我的心情非常開心，因為平常大家都很忙，很少有時間一起出去走走。\n\n到了公園，我看到很多小朋友在玩溜滑梯，也有人在草地上野餐。爸爸陪我打球，媽媽在旁邊幫我們拍照。我一開始打得不好，球常常滾到旁邊，但是爸爸一直鼓勵我，還教我怎麼瞄準。練習幾次後，我終於打得比較準了。\n\n中午，我們坐在樹下吃點心。微風吹過來，讓人覺得很舒服。我一邊吃餅乾，一邊聽爸爸媽媽聊天，心裡覺得很幸福。雖然只是簡單的一天，沒有去很遠的地方，但是和家人在一起就是最開心的事。這一天讓我留下美好的回憶。回家後，我把今天拍的照片看了一遍，覺得每一張都很珍貴。我也明白，快樂不一定要花很多錢，只要家人互相關心，普通的星期天也會變得特別。晚上睡覺前，我還一直想著公園裡的笑聲和家人的陪伴。這一天讓我明白，快樂常常藏在生活的小地方，只要用心感受，平凡的一天也會變得很特別。", "一次旅遊": "暑假的一天，我和爸爸媽媽一起去海邊旅遊。早上出門時，我的心情又期待又興奮，一路上一直看著窗外的風景，想像海邊會是什麼樣子。到了目的地，我立刻看到藍藍的大海和白白的浪花。\n\n海風吹在臉上涼涼的，很舒服。我脫下鞋子走在沙灘上，沙子軟軟的，好像在幫我的腳按摩。爸爸陪我一起堆沙堡，媽媽在旁邊拍照。雖然我們的沙堡不大，還差一點被浪花沖走，但是我們還是笑得很開心。\n\n中午，我們在附近的小店吃飯，還吃了冰淇淋。下午，我們沿著海邊散步，看見海鷗在天空飛來飛去，好像在跟我們打招呼。回家的時候，我有一點累，可是心裡很快樂。這次旅遊讓我知道，和家人一起出門，就是最美好的回憶。晚上躺在床上時，我還一直想著海浪的聲音和沙灘的感覺。這次旅行讓我更喜歡大自然，也讓我知道出門旅遊時要注意安全，並且珍惜和家人相處的時間。", "我的學校": "我的學校是一個溫暖又熱鬧的地方。每天早上走進校門，我都會看到老師和同學，有時候還會聽到大家互相打招呼的聲音，讓我覺得一天的學習開始了。\n\n學校裡有明亮的教室、寬廣的操場，還有安靜的圖書館。我最喜歡下課時到操場走一走，因為可以看到同學打球、跑步，也可以讓眼睛休息一下。上課的時候，老師會用有趣的方法教我們，讓我覺得學習不是一件無聊的事。\n\n我最喜歡自然課，因為可以觀察植物和小動物。有一次老師帶我們看葉子的形狀，我才發現原來每一片葉子都不太一樣。我的學校讓我學到知識，也讓我交到朋友。我希望自己每天都能珍惜在學校的時間，認真學習，也和同學好好相處。我也希望自己能把教室保持乾淨，上課時專心聽講，下課時和同學友善相處。這樣不但能讓自己進步，也能讓我們的學校變成更快樂的地方。", "我最喜歡的動物": "我最喜歡的動物是小狗，因為小狗很可愛，也很聰明。每次看到小狗搖尾巴，我都覺得牠好像在跟人打招呼，讓我的心情變得很好。\n\n小狗有圓圓的眼睛、濕濕的鼻子，跑起來的樣子很活潑。有些小狗會聽主人的話，坐下、握手，甚至把球叼回來。我覺得牠們不只是寵物，也像是人類的好朋友。牠們會陪伴主人，讓家裡多了很多快樂的聲音。\n\n有一次，我看到鄰居的小狗在門口等主人回家。主人一出現，牠就開心地跑過去，尾巴搖個不停。那一刻，我覺得小狗真的很有感情。如果以後我有機會養小狗，我一定會好好照顧牠，準時餵牠、帶牠散步，也不會隨便拋棄牠。愛護動物是每個人都應該做到的事。我也知道，喜歡動物不是只覺得牠們可愛而已，更要懂得負責任。看到流浪動物時，我們可以用正確的方法幫助牠們，讓牠們有機會被好好照顧。所以我覺得，喜歡小狗不只是想和牠玩，也要懂得尊重生命。每一隻動物都需要被好好照顧，我們不能因為一時喜歡就隨便飼養，更不能拋棄牠們。", "我的夢想": "我的夢想是長大後當一位老師，因為老師可以教小朋友很多知識，也可以幫助學生變得更好。每次看到老師站在講台前認真上課，我都覺得老師很厲害，也很值得尊敬。\n\n我會有這個夢想，是因為我的老師很有耐心。有時候我遇到不會的題目，心裡很緊張，但是老師不會笑我，而是一步一步說明，直到我聽懂為止。老師也常常鼓勵我們，只要願意努力，就一定會慢慢進步。\n\n為了完成這個夢想，我現在要先把自己的功課學好，也要練習清楚地說話。除此之外，我還要學會關心別人，因為老師不只要會教書，也要懂得照顧學生的心情。我知道夢想不是一天就能完成的，但是我願意一步一步努力，希望未來能成為一位溫柔又認真的老師。如果有一天我真的成為老師，我希望我的學生不只學會課本上的知識，也能學會勇敢、善良和負責。想到這裡，我就更想從現在開始好好努力。", "難忘的一件事": "有一件事讓我一直忘不了，那是上學期運動會發生的事。那天操場上非常熱鬧，彩旗在風中飄動，老師、同學和家長都來幫大家加油。我參加的是跑步比賽，心裡又緊張又期待。\n\n比賽開始前，我站在起跑線上，手心有一點冒汗。哨聲一響，我就用力往前跑。一開始我跑得還不錯，可是到了後面覺得腳很酸，速度也慢了下來。這時候，我聽到同學大聲喊我的名字，叫我不要放棄。\n\n雖然最後我沒有得到第一名，但是我還是努力跑完全程。老師對我說：「你很棒，因為你沒有放棄。」這句話讓我非常感動。這件事讓我明白，結果不是最重要的，勇敢參加和努力完成才值得驕傲。以後遇到困難，我也要像那天一樣堅持到底。回到教室後，我雖然滿身是汗，心裡卻很快樂。因為我知道自己已經比以前更勇敢了。這份經驗會一直鼓勵我，讓我在下一次挑戰時不輕易退縮。", "幫忙做家事": "星期六下午，我看到媽媽在整理家裡，忙得滿頭大汗，心裡覺得她很辛苦。於是我決定放下玩具，主動幫忙做家事，讓媽媽可以輕鬆一點。\n\n我先把自己的書桌整理乾淨，把鉛筆、橡皮擦和課本放回原來的位置。接著，我把玩具收進箱子裡，再拿抹布擦桌子。剛開始我擦得不太乾淨，還漏掉了桌角，媽媽就提醒我要仔細一點。後來我慢慢擦，終於把桌子擦得亮亮的。\n\n做完家事後，我覺得有一點累，可是看到房間變乾淨，心裡很有成就感。媽媽也笑著對我說謝謝，讓我覺得很開心。這次經驗讓我知道，家裡的整潔不是自己出現的，而是家人每天辛苦整理出來的。以後我會更主動幫忙，做一個有責任感的孩子。晚上睡覺前，我看著乾淨的房間，心裡覺得很舒服。我也發現，幫忙做家事不是處罰，而是愛家人的表現。只要大家一起分擔，家就會更溫暖。晚上睡覺前，我看著乾淨的房間，心裡覺得很舒服。我也發現，幫忙做家事不是處罰，而是愛家人的表現。只要大家一起分擔，家就會更溫暖。", "下雨天": "今天早上，天空灰灰的，雲層看起來很厚。不久後，雨滴一顆一顆落下來，打在窗戶上，發出滴滴答答的聲音。我坐在窗邊看著外面，覺得下雨天和平常很不一樣。\n\n路上的人都撐著雨傘，有的人穿著雨衣騎車，車子經過水坑時，還會濺起小小的水花。校園裡的樹葉被雨洗得更綠了，空氣也變得很清新。雖然下雨讓人不能在操場上玩，但是聽著雨聲，也有一種安靜的感覺。\n\n放學時，媽媽拿著雨傘來接我。我們一起慢慢走回家，路上我小心避開水坑，媽媽提醒我要注意安全。雖然鞋子有一點濕，可是和媽媽一起走在雨中，我覺得很溫暖。下雨天有一點不方便，但也讓我看到不同的風景。回家後，我把濕掉的雨傘打開晾乾，也把鞋子放好。媽媽說我長大了，懂得照顧自己的東西。聽到這句話，我覺得很開心，也更喜歡這個特別的雨天。回家後，我把濕掉的雨傘打開晾乾，也把鞋子放好。媽媽說我長大了，懂得照顧自己的東西。聽到這句話，我覺得很開心，也更喜歡這個特別的雨天。", "運動會": "星期五是學校的運動會，一早大家就很興奮。操場上掛著彩旗，班上的同學也穿著整齊的運動服，看起來精神很好。老師提醒我們要注意安全，也要為參加比賽的同學加油。\n\n開幕典禮開始時，每個班級都排得很整齊。接著，各項比賽陸續開始，操場上充滿加油聲和笑聲。我參加的是大隊接力，輪到我跑的時候，我的心跳得很快，手也抓緊了接力棒。\n\n當同學把接力棒交給我時，我立刻用最快的速度往前衝。雖然跑到一半覺得很累，但是聽到同學大聲喊「加油」，我又有了力量。最後我們班雖然沒有得到第一名，但是大家都很努力，也一起完成了比賽。這次運動會讓我知道，團結合作比名次更重要。回到教室後，大家還一直討論比賽的過程。有人跑得很快，有人努力幫忙加油，每個人都有自己的貢獻。這一天讓我留下難忘的回憶，也讓班上的感情更好了。", "園遊會": "星期六，學校舉辦園遊會，我和爸爸媽媽一起到學校參加。還沒走進校門，我就聽到熱鬧的聲音，心裡非常期待。校園裡有許多攤位，每個攤位都布置得很漂亮。\n\n園遊會裡有賣飲料的、有賣點心的，還有許多好玩的遊戲攤。我先買了一杯果汁，喝起來冰冰甜甜的。接著，我和媽媽去玩套圈圈，第一次我沒有套中，心裡有一點失望，但是媽媽鼓勵我再試一次。\n\n第二次我更認真瞄準，終於套到一個小獎品，我開心得跳了起來。爸爸也說，只要願意再試一次，就有成功的機會。這次園遊會讓我覺得很快樂，不只吃到好吃的東西，也玩到有趣的遊戲。最重要的是，我感受到大家一起合作的熱鬧氣氛。回家後，我還拿著那個小獎品看了很久。雖然它不是很貴重，但是代表我努力後得到的成果。這一天也讓我知道，學校不只是上課的地方，也可以充滿歡笑。回家後，我還拿著那個小獎品看了很久。雖然它不是很貴重，但是代表我努力後得到的成果。這一天也讓我知道，學校不只是上課的地方，也可以充滿歡笑。", "我學會的一件事": "我學會的一件事是騎腳踏車。剛開始學的時候，我很害怕跌倒，所以只敢慢慢踩，眼睛還一直看著地上。爸爸告訴我要看前方，身體放輕鬆，車子才會比較穩。\n\n一開始，爸爸在後面扶著我的腳踏車。我踩了幾下，車子就搖搖晃晃，差一點倒下來。我心裡很緊張，甚至想放棄。可是爸爸鼓勵我說：「再試一次，你一定會進步。」聽了爸爸的話，我決定繼續練習。\n\n後來我每天都練一點點，慢慢地，我可以騎得比較直，也不那麼害怕了。有一天，爸爸偷偷放手，我竟然自己騎了好長一段路。那一刻，我開心地大叫起來。學會騎腳踏車讓我明白，只要不放棄，多練習就會成功。現在我騎腳踏車時，還是會注意安全，也會戴好安全帽。我很感謝爸爸陪我練習，因為他的鼓勵讓我變得更有信心。這次成功的經驗讓我很難忘。現在我騎腳踏車時，還是會注意安全，也會戴好安全帽。我很感謝爸爸陪我練習，因為他的鼓勵讓我變得更有信心。這次成功的經驗讓我很難忘。", "我最喜歡的季節": "我最喜歡的季節是春天，因為春天的天氣很舒服，不會太冷，也不會太熱。每次春天來的時候，我都覺得大自然好像重新醒過來，到處充滿生氣。\n\n春天的景色很美。樹上長出嫩綠的新葉，花兒也慢慢開了。有時候走在路上，還可以看到蝴蝶飛來飛去。微風吹過來，帶著一點花香，讓人覺得心情很好。我喜歡在這樣的天氣裡和家人到公園散步。\n\n在春天，我也喜歡觀察植物的變化。以前我沒有注意過小草和花朵，後來才發現它們每天都在慢慢長大。春天讓我覺得充滿希望，好像只要努力，就能像植物一樣長得更好。我喜歡這個溫暖又美麗的季節，也希望每年春天都能留下快樂的回憶。我也希望自己能像春天的小樹一樣，每天進步一點點。只要用心學習，認真生活，就能慢慢長大，變成更好的自己。春天對我來說，是一個充滿力量的季節。我也希望自己能像春天的小樹一樣，每天進步一點點。只要用心學習，認真生活，就能慢慢長大，變成更好的自己。春天對我來說，是一個充滿力量的季節。", "生日的一天": "今天是我的生日，一早起床，我就覺得心情特別好。爸爸媽媽對我說生日快樂，還摸摸我的頭，讓我覺得很幸福。到了學校，同學也祝我生日快樂，我的臉上一直帶著笑容。\n\n晚上回到家，我看到桌上放著一個漂亮的蛋糕，旁邊還有媽媽準備的晚餐。吃完飯後，爸爸幫我點蠟燭，大家一起唱生日快樂歌。我閉上眼睛許願，希望家人都健康，也希望自己能更認真讀書。\n\n最讓我感動的是，媽媽送我一張卡片，上面寫著鼓勵我的話。她說我又長大一歲，希望我能更勇敢、更懂事。我看了以後，心裡暖暖的。這一天讓我感受到家人的愛，也讓我明白生日不只是收禮物，更是感謝家人的日子。睡覺前，我把卡片放在書桌上，決定以後遇到困難時就拿出來看一看。這次生日讓我覺得自己被愛包圍，也提醒我要把這份愛回報給家人。睡覺前，我把卡片放在書桌上，決定以後遇到困難時就拿出來看一看。這次生日讓我覺得自己被愛包圍，也提醒我要把這份愛回報給家人。", "放學後的一件事": "今天放學後，我和同學一起走出教室。天空很藍，微風吹過來很舒服，我的心情也變得很輕鬆。因為媽媽還沒有來接我，所以我和朋友一起在校門口旁邊等候。\n\n等待的時候，我看到操場上還有幾位同學在打球，也聽到大家開心的笑聲。我的朋友提議玩猜拳遊戲，輸的人要說一個有趣的笑話。剛開始我一直輸，覺得有一點不好意思，但是朋友們都笑得很開心，我也跟著笑了。\n\n後來輪到小明輸，他說了一個很好笑的故事，大家笑到差點停不下來。雖然只是短短幾分鐘，但是我覺得放學後的時間變得很有趣。這件事讓我知道，快樂不一定要去很遠的地方，只要和朋友好好相處，平凡的一天也會變成美好的回憶。回家後，我把這件小事告訴媽媽，媽媽也笑了。她說，朋友之間的快樂常常藏在小地方。聽了這句話，我更覺得今天放學後的時光雖然短，卻非常珍貴。", "快樂的一天旅遊": "星期六早上，天氣很好，爸爸媽媽帶我去海邊旅遊。我一早就把水壺、帽子和小背包準備好，心裡非常期待。坐在車上的時候，我一直看著窗外的風景，看到樹木、房子和遠方的山，覺得今天一定會很快樂。\n\n到了海邊，我看到藍藍的大海和白白的浪花，海風吹在臉上涼涼的，很舒服。我脫下鞋子踩在沙灘上，沙子軟軟的，好像在幫我的腳按摩。爸爸陪我一起堆沙堡，媽媽在旁邊幫我們拍照。雖然我們的沙堡不大，但是我覺得它很漂亮，也很有成就感。\n\n中午，我們在附近的小店吃午餐，還吃了冰淇淋。下午，我們沿著海邊散步，看見海鷗在天空飛來飛去，好像在跟我們打招呼。我還撿到一個小貝殼，想把它帶回家當紀念。回家的時候，我有一點累，可是心裡很滿足。晚上我把小貝殼放在書桌上，看到它就想到海邊的笑聲和浪花。這次旅遊讓我知道，和家人在一起的時光最珍貴，也讓我留下快樂又難忘的回憶。"};

}

function switchMode(mode) {
  const subject = mode === 'subject';
  document.getElementById('subjectPage').classList.toggle('hidden', !subject);
  document.getElementById('essayPage').classList.toggle('hidden', subject);
  document.getElementById('modeSubjectBtn').classList.toggle('active', subject);
  document.getElementById('modeEssayBtn').classList.toggle('active', !subject);
  window.scrollTo({top:0, behavior:'smooth'});
}

function initSubjects() {
  const grid = document.getElementById("subjectGrid");
  grid.innerHTML = Object.keys(subjects).map(name => {
    const s = subjects[name];
    return `<button class="subjectBtn" data-subject="${name}">
      <div style="font-size:24px">${s.icon || '📘'} ${name}</div>
      <div style="font-size:13px;font-weight:600;margin-top:4px">${s.goal || ''}</div>
    </button>`;
  }).join("");
  document.querySelectorAll(".subjectBtn").forEach(btn => {
    btn.addEventListener("click", () => selectSubject(btn.dataset.subject));
  });
  const first = Object.keys(subjects)[0];
  selectSubject(first);
}

function selectSubject(name) {
  document.querySelectorAll(".subjectBtn").forEach(b => b.classList.toggle("active", b.dataset.subject === name));
  const s = subjects[name];
  document.getElementById("subjectTitle").textContent = (s.icon || "📘") + " " + name;
  document.getElementById("pointsBox").innerHTML = "<ul>" + (s.points || []).map(x => `<li>${x}</li>`).join("") + "</ul>";
  document.getElementById("stepsBox").innerHTML = "<ol>" + (s.steps || []).map(x => `<li>${x}</li>`).join("") + "</ol>";
  document.getElementById("quizBox").innerHTML = (s.quiz || []).map((q,i) => `
    <div class="quizItem">
      <b>第 ${i+1} 題：${q.q}</b>
      ${q.o.map(opt => `<button class="option" onclick="answerQuiz(this, '${name}', ${i}, '${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join("")}
      <div class="feedback"></div>
    </div>
  `).join("");
}

function answerQuiz(btn, subject, idx, opt) {
  const q = subjects[subject].quiz[idx];
  const box = btn.closest(".quizItem");
  box.querySelectorAll(".option").forEach(b => {
    b.disabled = true;
    if (b.textContent === q.a) b.classList.add("correct");
  });
  if (opt !== q.a) btn.classList.add("wrong");
  box.querySelector(".feedback").textContent = (opt === q.a ? "答對！" : "再想想。") + " " + q.e;
}

function initEssays() {
  const chips = document.getElementById("essayChips");
  const names = Object.keys(essaySamples);
  chips.innerHTML = names.map(n => `<button class="chip" data-essay="${n}">${n}</button>`).join("");
  document.querySelectorAll(".chip").forEach(btn => btn.addEventListener("click", () => selectEssay(btn.dataset.essay)));
  selectEssay(names.includes("快樂的一天旅遊") ? "快樂的一天旅遊" : names[0]);
}

function selectEssay(name) {
  document.querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b.dataset.essay === name));
  document.getElementById("essayTitle").textContent = "題目：" + name;
  const guide = essayGuides[name] || ["第 1 段：開頭。","第 2 段：經過一。","第 3 段：經過二。","第 4 段：感想。"];
  document.getElementById("essayGuide").innerHTML = "<ol>" + guide.map(x => `<li>${x}</li>`).join("") + "</ol>";
  const sample = essaySamples[name];
  document.getElementById("essaySample").textContent = sample;
  document.getElementById("essayCount").textContent = "範例字數：不含標點約 " + countNoPunct(sample) + " 字";
}

function updateEssayCount() {
  document.getElementById("myCount").textContent = "目前字數：不含標點約 " + countNoPunct(document.getElementById("essayInput").value) + " 字";
}

document.addEventListener("DOMContentLoaded", () => {
  initSubjects();
  initEssays();
});
</script>
</body>
</html>
